
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css">
    <title>Company Dashboard</title>

    
  </head>

  <body>
    
     <!-- nav -->
    <nav>
      <a onclick="goTo('home')">Home</a>
      <a onclick="goTo('departments')">Departments</a>
      <a onclick="goTo('add')">Add</a>
    </nav>

      <!-- home -->
    <section id="home">
      <h1>Dashboard</h1>

      <div class="cards">
        <div class="card">
          <h3>Employees</h3>
          <p id="empCount">3</p>
        </div>

        <div class="card">
          <h3>Departments</h3>
          <p>3</p>
        </div>

        <div class="card">
          <h3>Salary Avg</h3>
          <p id="avgSalary">6000</p>
        </div>
      </div>

      <table id="empTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Dept</th>
            <th>Salary</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>1</td>
            <td>Ahmed</td>
            <td>IT</td>
            <td>5000</td>
            <td>
              <button onclick="deleteEmployee(this, 'IT')">Delete</button>
            </td>
          </tr>

          <tr>
            <td>2</td>
            <td>Sara</td>
            <td>HR</td>
            <td>6000</td>
            <td>
              <button onclick="deleteEmployee(this, 'HR')">Delete</button>
            </td>
          </tr>

          <tr>
            <td>3</td>
            <td>Ali</td>
            <td>Marketing</td>
            <td>7000</td>
            <td>
              <button onclick="deleteEmployee(this, 'Marketing')">
                Delete
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </section>

    <!--  DEPARTMENTS  -->
    <section id="departments">
      <h1>Departments</h1>

      <table>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Employees Count</th>
        </tr>

        <tr>
          <td>1</td>
          <td>IT</td>
          <td id="itCount">1</td>
        </tr>
        <tr>
          <td>2</td>
          <td>HR</td>
          <td id="hrCount">1</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Marketing</td>
          <td id="mktCount">1</td>
        </tr>
      </table>
    </section>

    
    <section id="add">
      <h1>Add Employee</h1>

      <input id="id" placeholder="ID" />
      <input id="name" placeholder="Name" />

      <select id="dept">
        <option value="">Select Department</option>
        <option value="IT">IT</option>
        <option value="HR">HR</option>
        <option value="Marketing">Marketing</option>
      </select>

      <input id="salary" placeholder="Salary" />

      <br /><br />

      <button onclick="addEmployee()">Add</button>
    </section>

   
  </body>
</html>
